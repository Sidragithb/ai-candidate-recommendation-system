version: "3.9"

services:
  web:
    build: .
    command: gunicorn candidate_ai.wsgi:application -c gunicorn.conf.py
    env_file:
      - .env
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - redis
      - qdrant
      - postgres

  celery:
    build: .
    command: celery -A candidate_ai worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - qdrant

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
    depends_on:
      - web

  redis:
    image: redis:7-alpine

  qdrant:
    image: qdrant/qdrant:v1.15.4
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME:-candidate_ai}
      POSTGRES_USER: ${DJANGO_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  media_data:
  static_data:
  qdrant_data:
  postgres_data:
